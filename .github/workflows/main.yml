name: HeliPort CI/CD

run-name: HeliPort CI/CD - ${{ github.event_name }} - ${{ github.ref_name }}

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: 'Publish an immutable alpha prerelease'
        required: false
        type: boolean
        default: false
      publish_release:
        description: 'Publish a stable release'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  ARTIFACT_DIR: Artifacts

jobs:
  swift_concurrency_audit:
    name: Swift Concurrency Audit
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0

    - uses: actions/cache@v5.0.5
      with:
        path: build-concurrency-audit/SourcePackages
        key: ${{ runner.os }}-spm-concurrency-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-concurrency-
          ${{ runner.os }}-spm-

    - name: Build with Complete Swift Concurrency Checking
      run: |
        set -o pipefail
        xcodebuild ARCHS=x86_64 ONLY_ACTIVE_ARCH=NO -scheme HeliPort -configuration Debug -derivedDataPath build-concurrency-audit -disableAutomaticPackageResolution CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO SWIFT_STRICT_CONCURRENCY=complete OTHER_SWIFT_FLAGS="-warn-concurrency" > concurrency-audit.log

    - name: Fail on Swift 6 Concurrency Warnings
      run: |
        set -euo pipefail
        if grep -E "/HeliPort/(HeliPort|HeliPort Launcher)/.*warning:.*(Swift 6 language mode|Sendable|sendable|MainActor|main actor|concurrency|data races|actor-isolated|nonisolated)" concurrency-audit.log; then
          echo "::error::Swift concurrency audit found warnings that must be fixed before enabling Swift 6."
          exit 1
        fi

  validate_package:
    name: Validate, Package, and Checksum
    needs: swift_concurrency_audit
    runs-on: macos-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
      release_name: ${{ steps.version.outputs.release_name }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      make_latest: ${{ steps.version.outputs.make_latest }}
      publish_release: ${{ steps.version.outputs.publish_release }}

    steps:
    - uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0

    - uses: actions/cache@v5.0.5
      with:
        path: build/SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Install Dependencies
      run: |
        brew install create-dmg swiftlint uv
      env:
        HOMEBREW_NO_INSTALL_CLEANUP: 1
        HOMEBREW_NO_AUTO_UPDATE: 1

    - name: Resolve Version and Release Mode
      id: version
      env:
        MANUAL_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_prerelease }}
        MANUAL_STABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
        HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        set -euo pipefail

        if [[ "${MANUAL_PRERELEASE}" == "true" && "${MANUAL_STABLE}" == "true" ]]; then
          echo "::error::Choose either publish_prerelease or publish_release, not both."
          exit 1
        fi

        if [[ "${MANUAL_STABLE}" == "true" && "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
          echo "::error::Stable releases must be dispatched from ${DEFAULT_BRANCH}; current ref is ${GITHUB_REF_NAME}."
          exit 1
        fi

        GIT_SHA="$(git rev-parse --short HEAD)"
        MARKETING_VERSION="$(awk -F'= ' '/MARKETING_VERSION =/ {gsub(/[; \t]/, "", $2); print $2; exit}' HeliPort.xcodeproj/project.pbxproj)"
        ALPHA_ID="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.${GIT_SHA}"
        ALPHA_BUILD=$(( (GITHUB_RUN_NUMBER - 1) % 255 + 1 ))

        PUBLISH_RELEASE=false
        IS_PRERELEASE=false
        MAKE_LATEST=false
        RELEASE_CHANNEL=development
        RELEASE_VERSION="${MARKETING_VERSION}+${GIT_SHA}"
        RELEASE_TAG=""
        RELEASE_NAME="HeliPort ${RELEASE_VERSION}"
        BUNDLE_BUILD_VERSION="${MARKETING_VERSION}"
        SKIP_RELEASE=false

        if [[ "${HEAD_COMMIT_MESSAGE}" == *"[skip release]"* || "${HEAD_COMMIT_MESSAGE}" == *"[release skip]"* || "${HEAD_COMMIT_MESSAGE}" == *"[ci-only]"* ]]; then
          SKIP_RELEASE=true
        fi

        if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "master" && "${HEAD_COMMIT_MESSAGE}" != *"Bump version"* && "${SKIP_RELEASE}" == "false" ]]; then
          PUBLISH_RELEASE=true
          IS_PRERELEASE=true
          RELEASE_CHANNEL=alpha
          RELEASE_VERSION="${MARKETING_VERSION}-alpha.${ALPHA_ID}"
          RELEASE_TAG="v${RELEASE_VERSION}"
          RELEASE_NAME="HeliPort ${RELEASE_VERSION}"
          BUNDLE_BUILD_VERSION="${MARKETING_VERSION}a${ALPHA_BUILD}"
        elif [[ "${MANUAL_PRERELEASE}" == "true" ]]; then
          PUBLISH_RELEASE=true
          IS_PRERELEASE=true
          RELEASE_CHANNEL=alpha
          RELEASE_VERSION="${MARKETING_VERSION}-alpha.${ALPHA_ID}"
          RELEASE_TAG="v${RELEASE_VERSION}"
          RELEASE_NAME="HeliPort ${RELEASE_VERSION}"
          BUNDLE_BUILD_VERSION="${MARKETING_VERSION}a${ALPHA_BUILD}"
        elif [[ "${MANUAL_STABLE}" == "true" ]]; then
          PUBLISH_RELEASE=true
          MAKE_LATEST=legacy
          RELEASE_CHANNEL=stable
          RELEASE_VERSION="${MARKETING_VERSION}"
          RELEASE_TAG="v${MARKETING_VERSION}"
          RELEASE_NAME="HeliPort ${MARKETING_VERSION}"
        fi

        {
          echo "VER=${MARKETING_VERSION}"
          echo "SHORT_SHA=${GIT_SHA}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}"
          echo "RELEASE_TAG=${RELEASE_TAG}"
          echo "RELEASE_NAME=${RELEASE_NAME}"
          echo "RELEASE_CHANNEL=${RELEASE_CHANNEL}"
          echo "BUNDLE_BUILD_VERSION=${BUNDLE_BUILD_VERSION}"
        } >> "${GITHUB_ENV}"

        {
          echo "release_tag=${RELEASE_TAG}"
          echo "release_version=${RELEASE_VERSION}"
          echo "release_name=${RELEASE_NAME}"
          echo "is_prerelease=${IS_PRERELEASE}"
          echo "make_latest=${MAKE_LATEST}"
          echo "publish_release=${PUBLISH_RELEASE}"
        } >> "${GITHUB_OUTPUT}"

        {
          echo "## Release Mode"
          echo
          echo "| Field | Value |"
          echo "| :-- | :-- |"
          echo "| Ref | \`${GITHUB_REF_NAME}\` |"
          echo "| Default branch | \`${DEFAULT_BRANCH}\` |"
          echo "| Channel | \`${RELEASE_CHANNEL}\` |"
          echo "| Publish release | \`${PUBLISH_RELEASE}\` |"
          echo "| Prerelease | \`${IS_PRERELEASE}\` |"
          echo "| Tag | \`${RELEASE_TAG:-none}\` |"
          echo "| Version | \`${RELEASE_VERSION}\` |"
          echo "| Bundle build | \`${BUNDLE_BUILD_VERSION}\` |"
        } >> "${GITHUB_STEP_SUMMARY}"
      shell: bash

    - name: Lint Swift Sources
      run: swiftlint lint --reporter github-actions-logging

    - name: Report Localization Coverage
      run: |
        uv run --with pycountry python <<'PY'
        import os, sys, json
        from pycountry import languages
        from collections import defaultdict

        def get_lang_name(code):
            if '-' in code:
                code = code.split('-')[0]
            lang = languages.get(alpha_2=code)
            return lang.name if lang else code

        def write_stats(file_path):
            with open(file_path, 'r', encoding='utf-8') as file:
                data = json.load(file)

            if data["version"] != "1.0":
                raise ValueError(f"Unsupported version: {data['version']}")

            strings = data["strings"]
            localizations = defaultdict(int)

            for string in strings.values():
                for lang_code in string["localizations"].keys():
                    localizations[lang_code] += 1

            summary = ["## i18n Stats", "",
                      "| Language | Code | Completion |",
                      "| :-- | :-- | --: |"]

            for lang_code, count in localizations.items():
                summary.append(f"| {get_lang_name(lang_code)} | {lang_code} | {(count / len(strings) * 100):.2f}% |")

            summary.extend(["",
                            f"- **Total Languages**: {len(localizations)}",
                            f"- **Total Strings**: {len(strings)}"])

            with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                f.write('\n'.join(summary) + '\n')

        try:
            write_stats("HeliPort/Appearance/Localizable.xcstrings")
        except Exception as e:
            print(f"::error::{str(e)}")
            sys.exit(1)
        PY

      shell: bash

    - name: Build Debug App
      if: steps.version.outputs.is_prerelease == 'true' || steps.version.outputs.publish_release == 'false'
      run: |
        set -o pipefail && xcodebuild ARCHS=x86_64 ONLY_ACTIVE_ARCH=NO -scheme HeliPort -configuration Debug -derivedDataPath build -disableAutomaticPackageResolution CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
          CURRENT_PROJECT_VERSION="${BUNDLE_BUILD_VERSION}" \
          OIW_RELEASE_CHANNEL="${RELEASE_CHANNEL}" \
          OIW_RELEASE_VERSION="${RELEASE_VERSION}" \
          OIW_BUILD_COMMIT="${SHORT_SHA}" \
          | xcbeautify --renderer terminal

    - name: Build Release App
      run: |
        set -o pipefail && xcodebuild ARCHS=x86_64 ONLY_ACTIVE_ARCH=NO -scheme HeliPort -configuration Release -derivedDataPath build -disableAutomaticPackageResolution CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
          CURRENT_PROJECT_VERSION="${BUNDLE_BUILD_VERSION}" \
          OIW_RELEASE_CHANNEL="${RELEASE_CHANNEL}" \
          OIW_RELEASE_VERSION="${RELEASE_VERSION}" \
          OIW_BUILD_COMMIT="${SHORT_SHA}" \
          | xcbeautify

    - name: Package DMG
      if: steps.version.outputs.publish_release == 'true'
      run: |
        XCBUILD_PATH="build/Build/Products/Release"
        cp LICENSE "${XCBUILD_PATH}"
        cd "${XCBUILD_PATH}"
        curl -sLO https://openintelwireless.github.io/HeliPort/dmg/VolumeIcon.icns
        curl -sLO https://openintelwireless.github.io/HeliPort/dmg/dmg-background.tiff
        create-dmg \
          --volname "HeliPort" \
          --volicon "VolumeIcon.icns" \
          --background "dmg-background.tiff" \
          --window-pos 200 120 \
          --window-size 660 420 \
          --text-size 12 \
          --eula "LICENSE" \
          --icon-size 160 \
          --icon "HeliPort.app" 180 170 \
          --hide-extension "HeliPort.app" \
          --app-drop-link 480 170 \
          "HeliPort.dmg" \
          "./HeliPort.app"
        cd -
        mkdir -p "${ARTIFACT_DIR}"
        cp -R "${XCBUILD_PATH}"/*.dmg "${ARTIFACT_DIR}"

    - name: Write Release Notes
      if: steps.version.outputs.publish_release == 'true'
      run: |
        {
          echo "# ${RELEASE_NAME}"
          echo
          if [[ "${RELEASE_CHANNEL}" == "alpha" ]]; then
            echo '### Disclaimer:'
            echo '***This alpha version is for testing only.***'
            echo 'It is not ready for daily use and we do not guarantee its usability.'
            echo 'If you discovered an issue and you do not have debugging skills, please check with the [Gitter Chat Room](https://gitter.im/OpenIntelWireless/itlwm) in advance before opening an Issue.'
            echo
          fi
          echo "Commit: \`${GITHUB_SHA}\`"
          echo
          echo '### The latest updates are:'
        } > ReleaseNotes.md

        LAST_STABLE_TAG="$(git tag --sort=-version:refname -l 'v[0-9]*' | grep -v -- '-' | head -1 || true)"
        if [[ -n "${LAST_STABLE_TAG}" ]]; then
          RANGE="${LAST_STABLE_TAG}..HEAD"
        else
          RANGE="HEAD"
        fi

        git log "${RANGE}" --format="- %H %s" | { grep -v '.git\|Merge\|yml\|CI' || true; } | sed  '/^$/d' >> ReleaseNotes.md
        cp ReleaseNotes.md "${ARTIFACT_DIR}/ReleaseNotes.md"
      shell: bash

    - name: Generate Stable Sparkle Appcast
      if: steps.version.outputs.publish_release == 'true' && steps.version.outputs.is_prerelease == 'false'
      run: |
        REPO_COMMIT_URL='https://github.com/OpenIntelWireless/HeliPort/commit/'
        INDENT='                    '
        PART1="${INDENT}<li><a class=\"commit-link\" data-hovercard-type=\"commit\" data-hovercard-url=\"${REPO_COMMIT_URL}"
        PART2="/hovercard\" href=\"${REPO_COMMIT_URL}"
        PART3="\"><tt>"
        PART4='</tt></a> '
        PART5='</li>'
        LAST_STABLE_TAG="$(git tag --sort=-version:refname -l 'v[0-9]*' | grep -v -- '-' | head -1 || true)"
        if [[ -n "${LAST_STABLE_TAG}" ]]; then
          CHANGELOG_RANGE="${LAST_STABLE_TAG}..HEAD"
        else
          CHANGELOG_RANGE="HEAD"
        fi
        CHANGELOG="$(git log "${CHANGELOG_RANGE}" --format="${PART1}%H${PART2}%H${PART3}%h${PART4}%s${PART5}" | cat)"

        SPARKLE_BIN='./build/SourcePackages/artifacts/sparkle/Sparkle/bin'
        PUBDATE="$(date +"%a, %d %b %Y %T %z")"
        APPCAST=(
            '<?xml version="1.0" standalone="yes"?>'
            '<rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">'
            '    <channel>'
            '        <title>HeliPort</title>'
            '        <item>'
            "            <title>${VER}</title>"
            "            <pubDate>${PUBDATE}</pubDate>"
            '            <description><![CDATA['
            '                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Primer/19.4.0/primer.min.css"><meta charset="UTF-8"><div class="markdown-body"><h3>The latest updates are:</h3><ul>'
            "${CHANGELOG}"
            '                </ul></div>'
            '            ]]>'
            '            </description>'
            '            <sparkle:minimumSystemVersion>10.12</sparkle:minimumSystemVersion>'
            "            <enclosure url=\"https://github.com/OpenIntelWireless/HeliPort/releases/latest/download/HeliPort.dmg\" sparkle:version=\"${BUNDLE_BUILD_VERSION}\" sparkle:shortVersionString=\"${VER}\" type=\"application/octet-stream\" $($SPARKLE_BIN/sign_update -s ${SPARKLE_KEY} ./Artifacts/HeliPort.dmg)/>"
            '        </item>'
            '    </channel>'
            '</rss>'
        )

        for appcast in "${APPCAST[@]}"; do
            echo "${appcast}" >> ./Artifacts/appcast.xml
        done
      shell: zsh {0}
      env:
        SPARKLE_KEY: ${{ secrets.SPARKLE_KEY }}

    - name: Generate SHA256 Checksums
      if: steps.version.outputs.publish_release == 'true'
      run: |
        cd "${ARTIFACT_DIR}"
        shasum -a 256 -- ./* > SHA256SUMS

    - name: Upload Packaged Artifacts
      if: steps.version.outputs.publish_release == 'true'
      uses: actions/upload-artifact@v7.0.1
      with:
        name: release-artifacts
        path: ${{ env.ARTIFACT_DIR }}/*
        if-no-files-found: error
        retention-days: 30

  publish_release:
    name: Publish GitHub Release
    needs: validate_package
    if: needs.validate_package.outputs.publish_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
    - uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0

    - name: Download Packaged Artifacts
      uses: actions/download-artifact@v8.0.1
      with:
        name: release-artifacts
        path: release-artifacts

    - name: Attest Release Artifacts
      uses: actions/attest@v4.1.0
      with:
        subject-path: release-artifacts/*

    - name: Publish GitHub Release
      uses: ncipollo/release-action@v1.21.0
      with:
        artifactErrorsFailBuild: true
        immutableCreate: true
        makeLatest: ${{ needs.validate_package.outputs.make_latest }}
        prerelease: ${{ needs.validate_package.outputs.is_prerelease }}
        bodyFile: release-artifacts/ReleaseNotes.md
        artifacts: "release-artifacts/*"
        tag: ${{ needs.validate_package.outputs.release_tag }}
        name: ${{ needs.validate_package.outputs.release_name }}
        commit: ${{ github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
